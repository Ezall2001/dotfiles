# general
editor = "nvim"
dir_editor = "nvim"
auto_check_update = false
cd_on_quit = false
default_open_file_preview = true
show_image_preview = true
show_panel_footer_info = true
file_size_use_si = true
default_directory = "."
default_sort_type = 0
sort_order_reversed = false
case_sensitive_sort = false
shell_close_on_success = false
page_scroll_size = 5
debug = false
ignore_missing_fields = false
file_panel_extra_columns = 1
file_panel_name_percent = 70

# style
theme = "custom_dracula"
code_previewer = "bat"
nerdfont = true
show_select_icons = true
transparent_background = true
file_preview_width = 0
enable_file_preview_border = true
sidebar_width = 15
sidebar_sections = ["home", "pinned", "disks"]
border_top = '─'
border_bottom = '─'
border_left = '│'
border_right = '│'
border_top_left = '╭'
border_top_right = '╮'
border_bottom_left = '╰'
border_bottom_right = '╯'
border_middle_left = '├'
border_middle_right = '┤'

# plugins
metadata = true
enable_md5_checksum = true
zoxide_support = true
[open_with]
