# LEFT
## USER
[username]
style_user = 'bold fg:username_text bg:username_bg'
style_root = 'bold italic fg:username_text bg:username_bg'
format = '[$user]($style)'
show_always = true
aliases = { "Administrator" = "َ°،—  root" }

[hostname]
ssh_only = false
format = '[@$hostname ](bold italic fg:username_text bg:username_bg)'

## DIR
[directory]
use_os_path_sep = false
truncation_symbol = 'ï‘„ /'
home_symbol = 'îک— '
read_only = 'â”ƒ َ°ڈ® '
read_only_style = 'bold fg:directory_text bg:directory_bg'
style = 'italic bold fg:directory_text bg:directory_bg'
repo_root_style = 'italic bold underline fg:directory_text bg:directory_bg'
format = """\
[î‚°](fg:username_bg bg:directory_bg)\
[ $path ]($style)\
[($read_only)]($read_only_style)\
[î‚°](fg:directory_bg bg:git_bg)"""
repo_root_format = """\
[î‚°](fg:username_bg bg:directory_bg)\
[ î©¢ /]($style)[$repo_root]($repo_root_style)\
[$path ]($style)\
[($read_only)]($read_only_style)\
[î‚°](fg:directory_bg bg:git_bg)"""


## GIT
[git_branch]
format = '[$branch(:$remote_branch)](bold fg:git_brown bg:git_bg)'
always_show_remote = false
truncation_symbol = 'َ°¨؟ '
truncation_length = 20
only_attached = true

[git_commit]
format = '[\[$hash($tag)\]](bold italic fg:git_brown bg:git_bg)'
only_detached = true
tag_disabled = false
tag_symbol = 'ًں”–'
tag_max_candidates = 0

## GIT
[git_metrics]
format = "([(-$deleted)]($deleted_style)|[(+$added)]($added_style))"
added_style = 'bold bg:git_bg fg:git_green'
deleted_style = 'bold bg:git_bg fg:git_red'
disabled = false

[git_state]
rebase = 'َ°“‚ '
merge = 'î®« '
revert = 'َ°•چ '
cherry_pick = '[َ±پ‚ ](fg:git_red bg:git_bg)'
bisect = 'َ±‚… '
format = '[$state( $progress_current/$progress_total)](fg:git_brown bg:git_bg)'
disabled = false

[git_status]
up_to_date = ''
ahead = 'َ±ƒ­ '
behind = 'َ±ƒ© '
diverged = 'َ°¾· '
conflicted = 'î©¬ '
untracked = 'َ±™” '
staged = 'َ°ژ‌ '
modified = 'َ±‍‚ '
deleted = 'َ±™’ '
renamed = 'َ°ڑ¹ '
stashed = 'َ°ک“ '
format = '[(\[$all_status$ahead_behind\])](fg:git_brown bg:git_bg)'
disabled = false


# MID
[fill]
symbol = ' '
style = 'bg:fill_bg'


# RIGHT
## STATUS
[character]
success_symbol = 'ًںڑ€'
error_symbol = 'ًں¤¯'
vimcmd_symbol = '' # not implemented yet
vimcmd_visual_symbol = '' # not implemented yet
format = '[$symbol](bold bg:status_bg)'

## BATTERY
[battery]
format = '[$symbol$percentage]($style)'

[[battery.display]]
threshold = 50
style = 'bold fg:status_dark_green bg:status_bg'
charging_symbol = 'َ°¢‌ '
discharging_symbol = 'َ°پ¾ '

[[battery.display]]
threshold = 20
style = 'bold fg:status_dark_yellow bg:status_bg'
charging_symbol = 'َ°‚† '
discharging_symbol = 'َ°پ» '

[[battery.display]]
threshold = 10
style = 'bold fg:status_dark_red bg:status_bg'
charging_symbol = 'َ°¢ں '
discharging_symbol = 'َ±ƒچ '

## LANG
[lua]
format = '[îک  ](bold fg:status_dark_blue bg:status_bg)'

[nodejs]
format = '[îœک ](bold fg:status_dark_green bg:status_bg)'

[python]
format = '[َ±”ژ ](bold fg:status_dark_green bg:status_bg)'

## PERF
[cmd_duration]
format = '([َ±ژ« ](bold fg:status_dark_yello bg:status_bg)[$duration](bold fg:status_green bg:status_bg))'
min_time = 100 # (in ms)
show_milliseconds = true
show_notifications = true
min_time_to_notify = 60000 # 1 min (in ms)
notification_timeout = 3000 # 3 sec (in ms)

## TIME
[time]
disabled = false
time_format = '%H%M.%S'
format = '[$time](bold fg:status_red bg:status_bg)'





