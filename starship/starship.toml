"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
continuation_prompt = '[´üÄ ](bold blue)'

format = """
[ÔľĹÔľĺÔľô](fg:username_bg)\
$username\
$hostname\
\
$directory\
\
[( ţéá \
($git_branch )($git_commit )($git_metrics )($git_status )($git_state )\
)[ţé░](fg:git_bg bg:fill_bg)\
](fg:git_brown bg:git_bg)\
\
$fill\
\
[ţéÂ](bg:fill_bg fg:status_bg)[\
($status )\
($lua)($nodejs)($python)\
($cmd_duration )\
$time \
](bg:status_bg)
­čôť """


palette = 'dracula_custom'

[palettes.dracula_custom]
	username_bg = '#371D49'
	username_text = 'bright-purple'

	directory_bg = 'red'
	directory_text = 'bright-white'

	git_bg = '#ead3c1'
	git_brown = '#533f4b'
	git_red = '#D00050'
	git_green = '#008B48'

	fill_bg = '#151127'

	status_bg = 'white'
	status_black = 'black'
	status_red = '#D00050'
	status_green = '#008B48'
	status_brown = '#B78F71'
	status_yellow = '#ADBA17'
	status_blue = 'blue'


# LEFT
## DIR
[directory]
	use_os_path_sep = false
	truncation_symbol = 'ˇ░ęÇ/'
	home_symbol = 'ţśŚ '
	read_only = 'Ôöâ ˇ░Ć« '
	read_only_style = 'bold fg:directory_text bg:directory_bg'
	style = 'italic bold fg:directory_text bg:directory_bg'
	repo_root_style = 'italic bold underline fg:directory_text bg:directory_bg'
	format = """\
[ţé░](fg:username_bg bg:directory_bg)\
[ $path ]($style)\
[($read_only)]($read_only_style)\
[ţé░](fg:directory_bg bg:git_bg)"""
	repo_root_format = """\
[ţé░](fg:username_bg bg:directory_bg)\
[ ţęó /]($style)[$repo_root]($repo_root_style)\
[$path ]($style)\
[($read_only)]($read_only_style)\
[ţé░](fg:directory_bg bg:git_bg)"""


## GIT
[git_branch]
	format = '[$branch(:$remote_branch)](bold fg:git_brown bg:git_bg)'
	always_show_remote = false
	truncation_symbol = 'ˇ░Ę┐ '
	truncation_length = 20
	only_attached = true

[git_commit]
	format = '[\[$hash($tag)\]](bold italic fg:git_brown bg:git_bg)'
	only_detached = true
	tag_disabled = false
	tag_symbol = '­čöľ'
	tag_max_candidates = 0

[git_metrics]
	format = "([(-$deleted)]($deleted_style)|[(+$added)]($added_style))"
	added_style = 'bold bg:git_bg fg:git_green'
	deleted_style = 'bold bg:git_bg fg:git_red'
	disabled = false

[git_state]
	rebase = 'ˇ░ôé '
	merge = 'ţ«ź '
	revert = 'ˇ░ĽŹ '
	cherry_pick = '[ˇ▒üé ](fg:git_red bg:git_bg)'
	bisect = 'ˇ▒éů '
	format = '[$state( $progress_current/$progress_total)](fg:git_brown bg:git_bg)'
	disabled = false

[git_status]
	up_to_date = ''
	ahead = 'ˇ▒âş '
	behind = 'ˇ▒âę '
	diverged = 'ˇ░żĚ '
	conflicted = 'ţęČ '
	untracked = 'ˇ▒Öö '
	staged = 'ˇ░ÄŁ '
	modified = 'ˇ▒×é '
	deleted = 'ˇ▒Öĺ '
	renamed = 'ˇ░Ü╣ '
	stashed = 'ˇ░śô '
	format = '[(\[$all_status$ahead_behind\])](fg:git_brown bg:git_bg)'
	disabled = false


# MID
[fill]
	symbol = ' '
	style = 'bg:fill_bg'


# RIGHT
## STATUS
[status]
	disabled = false
	success_symbol = '­čÜÇ'
	symbol = '[ţÄ┐](bold bg:status_bg fg:status_red)'
	not_executable_symbol = 'ÔŁî'
	not_found_symbol = 'ÔŁô'
	sigint_symbol = '­čĺú'
	signal_symbol = '­čĺú'
	recognize_signal_code = true
	map_symbol = true
	pipestatus = false
	format = '[$symbol](bold bg:status_bg)'

## LANG
[lua]
	version_format = 'v${major}'
	format = '[ţśá $version ](bold fg:status_blue bg:status_bg)'

[nodejs]
	version_format = 'v${major}'
	format = '[ţ┤Ź $version ](bold fg:status_green bg:status_bg)'

[python]
	version_format = 'v${major}'
	format = '[ˇ▒öÄ $version ](bold fg:status_yellow bg:status_bg)'

## PERF
[cmd_duration]
	format = '([ˇ▒Äź ](bold fg:status_brown bg:status_bg)[$duration](bold fg:status_brown bg:status_bg))'
	min_time = 100                                                                                     # (in ms)
	show_milliseconds = true
	show_notifications = true
	min_time_to_notify = 60000                                                                         # 1 min (in ms)
	notification_timeout = 3000                                                                        # 3 sec (in ms)

## TIME
[time]
	disabled = false
	time_format = '%H%M.%S'
	format = '[$time](bold fg:status_red bg:status_bg)'
