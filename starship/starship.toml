palette = 'dracula_official'


[palettes.dracula_official]
username_bg = '#472060'
username_text = 'purple'
directory_bg = '#F33A6A'
directory_text = 'bright-white'
git_bg = '#ead3c1'
git_brown = '#533f4b'
git_red = '#D00050'
git_green = '#008B48'
fill_bg = '#243342'
status_bg = '#fff0f9'
status_black = '#341916'
status_red = '#F33A6A'
status_green = '#20BB20'
status_yellow = 'yellow'
status_dark_yellow = 'yellow'
status_dark_grey = '#ead3c1'
status_dark_green = '#0de74f'
