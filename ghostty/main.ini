theme = dracula_custom
font-family = "JetBrainsMono Nerd Font"
font-family = "Fluent Emoji Color"
font-synthetic-style = bold-italic
font-shaping-break = cursor
font-size = 12
font-feature = +calt, +liga, +dlig
grapheme-width-method = unicode
alpha-blending = linear-corrected
freetype-load-flags = hinting,autohint
command = nu -e 'fastfetch'
working-directory = home
wait-after-command = false
minimum-contrast = 1.1
cursor-opacity = 1
cursor-style-blink = true
mouse-hide-while-typing = true
window-padding-x = 0,0
window-padding-y = 0,0
window-padding-balance = true
window-padding-color = background
window-decoration = none
window-theme = dark
window-save-state = never
confirm-close-surface = true
initial-window = true
quit-after-last-window-closed = false
clipboard-write = allow
clipboard-read = ask
clipboard-trim-trailing-spaces = true
clipboard-paste-protection = false
copy-on-select = true
selection-clear-on-typing = true
selection-clear-on-copy = true
title-report = false
shell-integration = detect
shell-integration-features = true
osc-color-report-format = 16-bit
app-notifications = true
gtk-single-instance = false
gtk-wide-tabs = true
desktop-notifications = false
term = xterm-ghostty
async-backend = auto
auto-update = off
