decoration {
    rounding = 4
    rounding_power = 10
    active_opacity = 0.90
    inactive_opacity = 0.83
    fullscreen_opacity = 1
    dim_inactive = false
    dim_special = 0.2
    border_part_of_window = true

    blur {
        enabled = true
        size = 4
        passes = 3
        new_optimizations = true
        ignore_opacity = on
        xray = false
        noise = 0
        contrast = 2
        brightness = 0.8
        vibrancy = 1
        vibrancy_darkness = 0.5

        popups = false
        special = false
        input_methods = false
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        ignore_window = true
        sharp = false
        offset = 0 0
        scale = 1
        color = rgba(202020ee)
    }

}
