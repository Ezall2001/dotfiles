general {
	hide_cursor = true
	ignore_empty_input = true
	immediate_render = false
	text_trim = true
	fractional_scaling = 2
	screencopy_mode = 0
	fail_timeout = 3000
}

background {
	path = $HOME/personal/media/wallpapers/anime-moon-landscape.jpg
	blur_size = 4
	blur_passes = 3
	brightness = 0.8
	noise = 0
}

input-field {
	monitor =
	size = 650, 60
	position = 0, 0
	halign = center
	valign = center

	dots_size = 0.2
	dots_spacing = 0
	dots_center = true
	dots_rounding = 0
	dots_text_format = 🌀

	hide_input = false
	fade_on_empty = false
	invert_numlock = false
	swap_font_color = false

	font_color = rgb(202, 49, 98)
	font_family = JetBrainsMono Nerd Font
	placeholder_text = 🧙🏻‍♂️ Tell me son. do you bear the Mark of an engineer ?
	fail_text = 🧙🏻‍♂️ <span font_family="JetBrainsMono Nerd Font"><b>Unworthy SCUM. YOU! shall not pass!</b></span>

	outline_thickness = 0
	rounding = 20
	inner_color = rgba(255, 255, 255, 0.7)
	check_color = rgb(21,35,52)
	fail_color = rgb(19,1,1)
}


