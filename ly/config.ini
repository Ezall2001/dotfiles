bigclock_seconds = false
clock = %H%M

asterisk = >
initial_info_text = null
blank_box = true
box_title = Arch BTW
hide_borders = false
margin_box_h = 2
margin_box_v = 1
input_len = 34
text_in_center = false
edge_margin = 0

full_color = false
fg = 0x0000
bg = 0x0001
border_fg = 0x0007
error_bg = 0x0001
error_fg = 0x0002
cmatrix_fg = 0x0005
